<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>United Solar — New Rep Onboarding</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #1D9E75;
    --green-light: #E1F5EE;
    --green-mid: #9FE1CB;
    --green-dark: #085041;
    --green-deep: #0F6E56;
    --purple-light: #EEEDFE;
    --purple-dark: #3C3489;
    --amber-light: #FAEEDA;
    --amber-dark: #633806;
    --bg: #f7f7f5;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.10);
    --border-mid: rgba(0,0,0,0.18);
    --text: #1a1a18;
    --text-secondary: #6b6b65;
    --radius: 12px;
    --radius-sm: 8px;
    --radius-pill: 99px;
  }

  body {
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header img {
    height: 44px;
    width: auto;
  }

  .header-divider {
    width: 1px;
    height: 32px;
    background: var(--border-mid);
  }

  .header-text h1 {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.2px;
  }

  .header-text p {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 1px;
  }

  .header-progress {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .header-progress span {
    font-size: 12px;
    color: var(--text-secondary);
    white-space: nowrap;
  }

  .prog-wrap {
    width: 120px;
    height: 5px;
    background: #e8e8e5;
    border-radius: var(--radius-pill);
    overflow: hidden;
  }

  .prog-fill {
    height: 100%;
    background: var(--green);
    border-radius: var(--radius-pill);
    transition: width 0.4s ease;
  }

  /* Layout */
  .layout {
    display: flex;
    min-height: calc(100vh - 85px);
  }

  /* Sidebar */
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 24px 0;
    position: sticky;
    top: 85px;
    height: calc(100vh - 85px);
    overflow-y: auto;
  }

  .sidebar-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: 0.8px;
    text-transform: uppercase;
    padding: 0 20px;
    margin-bottom: 10px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 20px;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }

  .nav-item:hover { background: var(--bg); }

  .nav-item.active {
    background: var(--green-light);
  }

  .nav-item.active::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: var(--green);
    border-radius: 0 2px 2px 0;
  }

  .nav-icon {
    width: 30px;
    height: 30px;
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
  }

  .nav-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    flex: 1;
  }

  .nav-item.active .nav-name { color: var(--green-dark); }

  .nav-check {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 1.5px solid var(--border-mid);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .nav-check.done {
    background: var(--green);
    border-color: var(--green);
  }

  /* Main */
  .main {
    flex: 1;
    padding: 32px;
    max-width: 680px;
  }

  .phase-title {
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
    letter-spacing: -0.4px;
  }

  .phase-sub {
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 24px;
  }

  /* Info block */
  .info-block {
    background: var(--green-light);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 16px;
    font-size: 13px;
    color: var(--green-dark);
    line-height: 1.6;
  }

  /* Platform tabs */
  .platform-tabs {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .ptab {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: var(--radius-pill);
    border: 1px solid var(--border-mid);
    color: var(--text-secondary);
    font-size: 13px;
    cursor: pointer;
    background: var(--surface);
    transition: all 0.15s;
    user-select: none;
  }

  .ptab:hover { background: var(--bg); }

  .ptab.active {
    background: var(--green-light);
    color: var(--green-dark);
    border-color: var(--green);
    font-weight: 500;
  }

  .ptab.pdone {
    color: var(--green-dark);
    border-color: var(--green);
  }

  .badge-closer {
    font-size: 10px;
    background: var(--amber-light);
    color: var(--amber-dark);
    padding: 1px 6px;
    border-radius: var(--radius-pill);
    font-weight: 500;
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 16px;
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .card-icon {
    width: 42px;
    height: 42px;
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .card-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
  }

  .card-subtitle {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 2px;
  }

  /* Tasks */
  .task {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 11px 0;
    border-top: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }

  .task:first-child { border-top: none; padding-top: 0; }
  .task:last-child { padding-bottom: 0; }

  .task:hover .cb { border-color: var(--green); }

  .cb {
    width: 20px;
    height: 20px;
    border-radius: 6px;
    border: 1.5px solid var(--border-mid);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
    transition: all 0.2s;
    background: var(--surface);
  }

  .cb.on {
    background: var(--green);
    border-color: var(--green);
  }

  .cb .ck { display: none; }
  .cb.on .ck { display: block; }

  .task-body { flex: 1; }

  .task-text {
    font-size: 14px;
    color: var(--text);
    line-height: 1.5;
  }

  .task-text.done {
    color: var(--text-secondary);
    text-decoration: line-through;
  }

  .task-note {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 3px;
    line-height: 1.5;
  }

  /* Meet card */
  .meet-card {
    background: var(--bg);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    margin-bottom: 10px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }

  .meet-icon {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--green-light);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .meet-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 3px;
  }

  .meet-time {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 2px;
  }

  .meet-dial {
    font-size: 11px;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }

  .meet-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    background: var(--green);
    color: #fff;
    font-size: 12px;
    font-weight: 500;
    border-radius: var(--radius-pill);
    text-decoration: none;
    transition: background 0.15s;
  }

  .meet-btn:hover { background: var(--green-deep); }

  /* Section label */
  .section-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin: 20px 0 10px;
  }

  /* Role note */
  .role-note {
    background: var(--purple-light);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    margin-bottom: 12px;
    font-size: 13px;
    color: var(--purple-dark);
  }

  /* Nav buttons */
  .nav-row {
    display: flex;
    gap: 10px;
    margin-top: 24px;
    flex-wrap: wrap;
  }

  .btn {
    padding: 10px 22px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border-mid);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    background: var(--surface);
    color: var(--text);
    transition: all 0.15s;
  }

  .btn:hover { background: var(--bg); }

  .btn-primary {
    background: var(--green);
    color: #fff;
    border-color: var(--green);
  }

  .btn-primary:hover { background: var(--green-deep); }

  /* Complete screen */
  .complete-wrap {
    text-align: center;
    padding: 60px 20px;
  }

  .complete-circle {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: var(--green-light);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
  }

  .complete-wrap h2 {
    font-size: 24px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 10px;
    letter-spacing: -0.4px;
  }

  .complete-wrap p {
    font-size: 15px;
    color: var(--text-secondary);
    margin-bottom: 28px;
    line-height: 1.6;
  }

  @media (max-width: 640px) {
    .sidebar { display: none; }
    .main { padding: 20px 16px; }
    .header-progress { display: none; }
  }
</style>
</head>

    id:"ready", name:"Hit the doors", icon:"🚪", iconBg:"#EAF3DE",
    sub:"You're ready to go",
    info:"You've signed your agreement, set up all platforms, and attended onboarding. Welcome to United Solar — time to get out there.",
    tasks:[
      {text:"All platforms are set up and working", note:"RepCard, Slack, Everee (+ Gmail for closers)"},
      {text:"Joined #Daily-Numbers on Slack", note:""},
      {text:"Attended at least one 9am onboarding call", note:""}
    ]
  }
];

let cur = 0, platformIdx = 0;
let checked = phases.map(ph => {
  if (ph.platforms) return ph.platforms.map(p => new Array(p.tasks.length).fill(false));
  return new Array(ph.tasks.length).fill(false);
});

function phaseDone(i) {
  const ph = phases[i];
  if (ph.infoOnly) return true;
  if (ph.platforms) return checked[i].every(a => a.every(Boolean));
  return checked[i].length === 0 || checked[i].every(Boolean);
}

function totalDone() {
  return phases.reduce((s, ph, i) => {
    if (ph.infoOnly) return s;
    if (ph.platforms) return s + checked[i].flat().filter(Boolean).length;
    return s + checked[i].filter(Boolean).length;
  }, 0);
}

function totalTasks() {
  return phases.reduce((s, ph) => {
    if (ph.infoOnly) return s;
    if (ph.platforms) return s + ph.platforms.reduce((ss, p) => ss + p.tasks.length, 0);
    return s + ph.tasks.length;
  }, 0);
}

function meetCardHTML(c) {
  return `<div class="meet-card">
    <div class="meet-icon">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="1" y="3" width="13" height="12" rx="2" fill="#1D9E75"/><path d="M14 7l3-2v8l-3-2V7z" fill="#0F6E56"/></svg>
    </div>
    <div>
      <div class="meet-title">${c.title}</div>
      <div class="meet-time">${c.time}</div>
      <div class="meet-dial">${c.dial}</div>
      <a class="meet-btn" href="${c.link}" target="_blank">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7h10M8 3l4 4-4 4" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Join on Google Meet
      </a>
    </div>
  </div>`;
}

function taskHTML(t, idx, clickFn, on) {
  return `<div class="task" onclick="${clickFn}(${idx})">
    <div class="cb ${on ? 'on' : ''}">
      <svg class="ck" width="12" height="12" viewBox="0 0 12 12" fill="none">
        <path d="M2 6l3 3 5-5" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="task-body">
      <div class="task-text ${on ? 'done' : ''}">${t.text}</div>
      ${t.note ? `<div class="task-note">${t.note}</div>` : ''}
    </div>
  </div>`;
}

function renderSidebar() {
  document.getElementById('sidebar-nav').innerHTML = phases.map((p, i) => {
    const done = phaseDone(i);
    return `<div class="nav-item ${i === cur ? 'active' : ''}" onclick="goTo(${i})">
      <div class="nav-icon" style="background:${p.iconBg}">${p.icon}</div>
      <span class="nav-name">${p.name}</span>
      <div class="nav-check ${done ? 'done' : ''}">
        ${done ? `<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 5l2.5 2.5 4-4" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>` : ''}
      </div>
    </div>`;
  }).join('');
}

function renderProgress() {
  const td = totalDone(), tt = totalTasks();
  document.getElementById('prog').style.width = Math.round((td / tt) * 100) + '%';
  document.getElementById('prog-label').textContent = `${td} of ${tt} tasks`;
}

function renderMain() {
  const ph = phases[cur];
  let html = `<div class="phase-title">${ph.icon} ${ph.name}</div>
    <div class="phase-sub">${ph.sub}</div>`;

  if (ph.platforms) {
    html += `<div class="platform-tabs">` + ph.platforms.map((p, i) => {
      const done = checked[cur][i].filter(Boolean).length;
      const all = p.tasks.length;
      const isA = i === platformIdx;
      const isDone = done === all;
      const closerBadge = p.name === 'Gmail' ? `<span class="badge-closer">closers only</span>` : '';
      return `<div class="ptab ${isA ? 'active' : isDone ? 'pdone' : ''}" onclick="setPlatform(${i})">${p.icon} ${p.name} ${closerBadge} ${isDone ? '✓' : done + '/' + all}</div>`;
    }).join('') + `</div>`;

    const p = ph.platforms[platformIdx];
    if (p.name === 'Gmail') {
      html += `<div class="role-note">Gmail is for closers only. Setters can skip this step.</div>`;
    }
    html += `<div class="card">
      <div class="card-header">
        <div class="card-icon" style="background:${p.bg}">${p.icon}</div>
        <div>
          <div class="card-title">${p.name}</div>
          <div class="card-subtitle">${p.sub}</div>
        </div>
      </div>
      ${p.tasks.map((t, ti) => taskHTML(t, ti, 'toggleP_' + platformIdx, checked[cur][platformIdx][ti])).join('')}
    </div>`;

  } else {
    if (ph.info) html += `<div class="info-block">${ph.info}</div>`;
    if (ph.callCards) ph.callCards.forEach(c => { html += meetCardHTML(c); });
    if (ph.setterCards) {
      html += `<div class="section-label">Setter training</div>`;
      ph.setterCards.forEach(c => { html += meetCardHTML(c); });
      html += `<div class="section-label">Closer training</div>`;
      ph.closerCards.forEach(c => { html += meetCardHTML(c); });
    }
    if (!ph.infoOnly && ph.tasks.length > 0) {
      html += `<div class="card">` + ph.tasks.map((t, ti) => taskHTML(t, ti, 'toggleT', checked[cur][ti])).join('') + `</div>`;
    }
  }

  // Nav
  html += `<div class="nav-row">`;
  if (cur > 0) html += `<button class="btn" onclick="goTo(${cur - 1})">← Back</button>`;
  if (cur < phases.length - 1) html += `<button class="btn btn-primary" onclick="goTo(${cur + 1})">Next: ${phases[cur + 1].name} →</button>`;
  if (cur === phases.length - 1) html += `<button class="btn btn-primary" onclick="showDone()">Complete onboarding ✓</button>`;
  html += `</div>`;

  document.getElementById('main-content').innerHTML = html;

  // Attach dynamic toggle functions for platform tasks
  if (ph.platforms) {
    ph.platforms.forEach((p, pi) => {
      window['toggleP_' + pi] = function(ti) {
        checked[cur][pi][ti] = !checked[cur][pi][ti];
        render();
      };
    });
  }
}

function showDone() {
  document.getElementById('prog').style.width = '100%';
  document.getElementById('prog-label').textContent = totalTasks() + ' of ' + totalTasks() + ' tasks';
  document.getElementById('sidebar-nav').innerHTML = phases.map((p, i) => `
    <div class="nav-item" onclick="goTo(${i})">
      <div class="nav-icon" style="background:${p.iconBg}">${p.icon}</div>
      <span class="nav-name">${p.name}</span>
      <div class="nav-check done">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 5l2.5 2.5 4-4" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </div>`).join('');
  document.getElementById('main-content').innerHTML = `
    <div class="complete-wrap">
      <div class="complete-circle">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
          <path d="M7 18l7 7L29 10" stroke="#1D9E75" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h2>Welcome to United Solar!</h2>
      <p>All platforms set up · Onboarding call attended · Training scheduled.<br>Let your manager know you're ready to hit the doors.</p>
      <button class="btn" onclick="restart()">← Review walkthrough</button>
    </div>`;
}

function goTo(i) { cur = i; platformIdx = 0; render(); }
function setPlatform(i) { platformIdx = i; renderMain(); }
function toggleT(ti) { checked[cur][ti] = !checked[cur][ti]; render(); }
function restart() { cur = 0; platformIdx = 0; render(); }

function render() {
  renderSidebar();
  renderProgress();
  renderMain();
}

render();
</script>
</body>
</html>
